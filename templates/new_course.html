{% extends "base.html" %}
{% block content %}
<style>
.nc-wrap{max-width:1000px;margin:0 auto;}
.nc-wrap .form-card input{padding:11px 14px;font-size:14px;}
.nc-wrap .form-card label{font-size:11.5px;margin-top:0;margin-bottom:7px;}
.nc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 28px;align-items:start;}
.nc-grid .nc-full{grid-column:1 / -1;}
@media(max-width:720px){.nc-grid{grid-template-columns:1fr;}}
</style>
<div class="nc-wrap">
<div class="page-hdr">
  <h2>➕ Create New Course</h2>
  <p>Fill in all course details</p>
</div>

{% if errors %}
<div class="flash error" role="alert">
  {% for e in errors %}<div>⚠️ {{ e }}</div>{% endfor %}
</div>
{% endif %}

<div class="form-card">
  <form method="POST" novalidate id="course-form">
   <div class="nc-grid">
    <div class="nc-full">
    <label for="f-code">Course Code <span style="color:var(--red);">*</span></label>
    <input id="f-code" type="text" name="code"
      value="{{ form_data.code if form_data else '' }}"
      placeholder="e.g. CSE3011, INE4211"
      required style="text-transform:uppercase;">
    </div>

    <div class="nc-full">
    <label for="f-name">Course Name <span style="color:var(--red);">*</span></label>
    <input id="f-name" type="text" name="name"
      value="{{ form_data.name if form_data else '' }}"
      placeholder="Full course name" required>
    </div>

    <div>
    <label for="f-dept">Department</label>
    <input id="f-dept" type="text" name="department"
      value="{{ form_data.department if form_data else '' }}"
      placeholder="e.g. Software Engineering">
    </div>

    <div>
    <label for="f-credit">Credits</label>
    <input id="f-credit" type="number" name="credit"
      value="{{ form_data.credit if form_data else '3' }}"
      min="1" max="9">
    </div>

    <div>
    <label for="f-classroom">Classroom</label>
    <input id="f-classroom" type="text" name="classroom"
      value="{{ form_data.classroom if form_data else '' }}"
      placeholder="e.g. A105, DSC02, B201"
      pattern="[A-Za-z]{1,4}[0-9]{2,4}[A-Za-z]?"
      title="Building letter + room number (e.g. A105, DSC02)">
    <div id="cls-err" style="display:none;font-size:11px;color:var(--red);margin-top:3px;">
      ⚠️ Invalid format. e.g. A105, DSC02, B201
    </div>
    </div>

    <div>
    <label for="f-schedule">Schedule</label>
    <input id="f-schedule" type="text" name="schedule"
      value="{{ form_data.schedule if form_data else '' }}"
      placeholder="e.g. Monday 13:30–17:20">
    </div>

    <div class="nc-full">
    <label for="f-email">Course Email</label>
    <input id="f-email" type="email" name="email"
      value="{{ form_data.email if form_data else '' }}"
      placeholder="e.g. cse3011@bau.edu.tr">
    <div id="email-err" style="display:none;font-size:11px;color:var(--red);margin-top:3px;">
      ⚠️ Please enter a valid email address.
    </div>
    </div>
   </div>

    <button type="submit" class="btn btn-primary" style="margin-top:18px;">✓ Create Course</button>
  </form>
</div>
</div>

<script>
const clsInput   = document.getElementById('f-classroom');
const emailInput = document.getElementById('f-email');
const clsErr     = document.getElementById('cls-err');
const emailErr   = document.getElementById('email-err');
const clsRe      = /^[A-Za-z]{1,4}\d{2,4}[A-Za-z]?$/;
const emailRe    = /^[\w.\-\+]+@[\w\-]+\.[a-z]{2,}(\.[a-z]{2,})?$/i;

clsInput.addEventListener('input', () => {
  const v = clsInput.value.trim();
  clsErr.style.display = (v && !clsRe.test(v)) ? 'block' : 'none';
});

emailInput.addEventListener('input', () => {
  const v = emailInput.value.trim();
  emailErr.style.display = (v && !emailRe.test(v)) ? 'block' : 'none';
});

document.getElementById('course-form').addEventListener('submit', function(e) {
  const cls   = clsInput.value.trim();
  const email = emailInput.value.trim();
  let ok = true;
  if (cls && !clsRe.test(cls))   { clsErr.style.display   = 'block'; ok = false; }
  if (email && !emailRe.test(email)) { emailErr.style.display = 'block'; ok = false; }
  if (!ok) e.preventDefault();
});
</script>
{% endblock %}
